name: Deploy API to Azure Web App - TaxView

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm -v

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter api run build

      # Optional but recommended: generate prisma client for the build output
      - name: Prisma generate
        run: pnpm --filter api exec -- prisma generate

      # Create a clean deployment package containing ONLY apps/api
      - name: Prepare deploy package
        run: |
          mkdir -p deploy/api
          rsync -av --delete \
            --exclude "node_modules" \
            --exclude ".env" \
            apps/api/ deploy/api/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4F75037729B446AA8AC238DB570672B9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0E49E179CA5048D19BB73D3853691D01 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_22C6665F36614909B7C276BAF08F2D23 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "TaxView"
          slot-name: "Production"
          package: deploy/api
